name: Build and Push Docker Image

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "Current version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR        
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        id: docker_hub_login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Prepare Docker Hub tags
        id: docker_hub_tags
        run: |
          if [ "${{ steps.docker_hub_login.outcome }}" = "success" ]; then
            DOCKER_HUB_TAGS="${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ steps.get_version.outputs.version }},${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest"
            echo "docker_hub_tags=$DOCKER_HUB_TAGS" >> $GITHUB_OUTPUT
            echo "push_to_docker_hub=true" >> $GITHUB_OUTPUT
          else
            echo "Docker Hub credentials not found, skipping..."
            echo "push_to_docker_hub=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push multi-arch images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.get_version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ${{ steps.docker_hub_tags.outputs.docker_hub_tags }}
          platforms: linux/amd64,linux/arm64
